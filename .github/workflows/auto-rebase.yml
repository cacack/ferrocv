name: auto-rebase

on:
  push:
    branches: [main]

# Token comes from the `ferrocv-release-bot` GitHub App (same App used by
# release-please.yml). Events generated by the default GITHUB_TOKEN do not
# trigger downstream workflows, so rebase pushes it makes would skip CI on
# the rebased PR — defeating the point. App-minted tokens re-trigger CI.
permissions: {}

concurrency:
  group: auto-rebase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: peter-evans/rebase@e4945786f7ca41fe6e101cead4395f5489593943 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          exclude: |
            dependabot/**
            release-please--**
