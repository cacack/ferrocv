# cargo-deny configuration. Run `cargo deny check` locally to mirror CI.
# Schema: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses compatible with the Rust ecosystem and our own
# dual MIT/Apache-2.0 license. Add new SPDX identifiers here only with
# justification.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    # MIT-0 is MIT No Attribution; required by `borrow-or-share`
    # (transitive: jsonschema -> referencing -> fluent-uri -> borrow-or-share).
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
