# cargo-deny configuration. Run `cargo deny check` locally to mirror CI.
# Schema: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Each ignore is a transitive advisory we cannot fix from this crate;
# upstream (typst's tree, mostly via syntect/hayagriva) has to upgrade.
# Revisit on every typst version bump.
ignore = [
    # bincode 1.3.3 unmaintained; transitive: typst → typst-library → syntect → bincode.
    { id = "RUSTSEC-2025-0141", reason = "transitive via typst → syntect; upstream syntect to migrate" },
    # paste 1.0.15 unmaintained; transitive: typst → typst-library → hayagriva → paste.
    { id = "RUSTSEC-2024-0436", reason = "transitive via typst → hayagriva; upstream typst/hayagriva to drop" },
    # yaml-rust 0.4.5 unmaintained; transitive: typst → typst-library → syntect → yaml-rust.
    { id = "RUSTSEC-2024-0320", reason = "transitive via typst → syntect; upstream syntect to migrate to yaml-rust2" },
]

[licenses]
version = 2
# Permissive licenses compatible with the Rust ecosystem and our own
# dual MIT/Apache-2.0 license. Add new SPDX identifiers here only with
# justification.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    # CC0-1.0 is a public-domain dedication; required by `roman-numerals-rs`
    # (transitive: typst-library -> hayagriva -> roman-numerals-rs).
    "CC0-1.0",
    # CDLA-Permissive-2.0 is the license Mozilla publishes the
    # `webpki-roots` root-certificate list under — the same list rustls
    # consumes for TLS verification. Only reachable under `--features
    # install` (webpki-roots is a transitive dep of ureq+rustls, which
    # are gated on the `install` feature). SPDX-identified permissive
    # license patterned after BSD; no viral clauses, no patent
    # surprises.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    # MIT-0 is MIT No Attribution; required by `borrow-or-share`
    # (transitive: jsonschema -> referencing -> fluent-uri -> borrow-or-share).
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
