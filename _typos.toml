# typos-cli configuration.
#
# We keep vendored upstream sources under `assets/themes/` verbatim
# (see each theme's VENDORING.md). Fixing upstream's typos inside the
# vendored copy would fork the file from upstream and bloat the
# re-vendor diff, so those files are excluded from typo-checking.
# Run `typos` directly on the upstream repo if you want to report
# fixes back to them.
#
# CHANGELOG.md is generated by release-please from commit messages and
# SHAs. Short hex SHAs (e.g. `6b2ba42`, `f654abd`) regularly trip typos
# with false positives like "ba"→"by" or "abd"→"and". Since we never
# hand-edit the changelog, excluding it wholesale is simpler than
# maintaining a per-SHA allow-list.

[files]
extend-exclude = [
    "assets/themes/**",
    "CHANGELOG.md",
]
