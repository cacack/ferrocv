[package]
name = "ferrocv"
version = "0.0.0"
edition = "2024"
rust-version = "1.85"
description = "Render JSON Resume documents to PDF, HTML, and plain text via embedded Typst."
license = "MIT OR Apache-2.0"
repository = "https://github.com/cacack/ferrocv"
readme = "README.md"
keywords = ["resume", "cv", "json-resume", "typst", "pdf"]
categories = ["command-line-utilities"]
include = [
    "src/**/*",
    "assets/schema/**/*",
    "Cargo.toml",
    "README.md",
    "LICENSE-*",
]

[lib]
name = "ferrocv"
path = "src/lib.rs"

[[bin]]
name = "ferrocv"
path = "src/main.rs"

[dependencies]

[dev-dependencies]
serde_json = "1"
